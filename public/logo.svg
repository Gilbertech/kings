<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Shield shape representing law/protection -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfa35f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9e8547;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Shield -->
  <path d="M 50 10 L 80 25 L 80 55 Q 80 80 50 90 Q 20 80 20 55 L 20 25 Z" fill="url(#goldGrad)" stroke="#294188" stroke-width="2"/>
  
  <!-- Inner Shield -->
  <path d="M 50 15 L 75 28 L 75 55 Q 75 77 50 86 Q 25 77 25 55 L 25 28 Z" fill="#294188"/>
  
  <!-- Balance/Scales symbol -->
  <circle cx="50" cy="50" r="3" fill="#bfa35f"/>
  <line x1="40" y1="50" x2="60" y2="50" stroke="#bfa35f" stroke-width="2"/>
  
  <!-- Left side of scales -->
  <path d="M 40 50 L 38 60" stroke="#bfa35f" stroke-width="1.5" fill="none"/>
  <rect x="35" y="60" width="6" height="6" fill="#bfa35f"/>
  
  <!-- Right side of scales -->
  <path d="M 60 50 L 62 60" stroke="#bfa35f" stroke-width="1.5" fill="none"/>
  <rect x="59" y="60" width="6" height="6" fill="#bfa35f"/>
  
  <!-- Center seal -->
  <circle cx="50" cy="48" r="8" fill="none" stroke="#bfa35f" stroke-width="1"/>
</svg>
